<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyMilio Points Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #008080 0%, #003F3F 100%);
      font-family: 'Press Start 2P', cursive;
      color: #000;
      display: flex;
      justify-content: center;
      box-sizing: border-box;
    }
    .main-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 600px;
      padding: 10px;
      padding-bottom: 50px;
      box-sizing: border-box;
    }
    .home-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background: linear-gradient(180deg, #C0C0C0 0%, #A0A0A0 100%);
      border: 1px solid #000;
      border-top: 1px solid #FFFFFF;
      border-left: 1px solid #FFFFFF;
      border-bottom: 1px solid #808080;
      border-right: 1px solid #808080;
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 3px;
      box-shadow: 1px 1px 0 #000;
      transition: background 0.2s, transform 0.1s;
    }
    .home-btn:hover {
      background: linear-gradient(180deg, #D0D0D0 0%, #B0B0B0 100%);
      transform: translate(-1px, -1px);
    }
    .home-btn:active {
      background: linear-gradient(180deg, #A0A0A0 0%, #808080 100%);
      transform: translate(1px, 1px);
      box-shadow: none;
      border: 1px inset #808080;
    }
    .home-btn svg {
      width: 20px;
      height: 20px;
      fill: #000080;
    }
    #site-title {
      font-size: clamp(16px, 4vw, 20px);
      margin: 50px 0 15px 0; /* Increased top margin to avoid overlap with home button */
      color: #FFFFFF;
      text-shadow: 1px 1px 0 #000080, 2px 2px 0 #000;
      text-align: center;
    }
    #site-title span {
      color: #FF0055;
    }
    .window {
      background: #C0C0C0;
      border: 2px solid #000080;
      border-top: 2px solid #FFFFFF;
      border-left: 2px solid #FFFFFF;
      border-bottom: 2px solid #808080;
      border-right: 2px solid #808080;
      width: clamp(200px, 80vw, 400px);
      box-shadow: 2px 2px 0 #000;
      margin: 10px 0;
      border-radius: 4px;
    }
    .title-bar {
      background: linear-gradient(90deg, #000080 0%, #1084D0 100%);
      color: #FFFFFF;
      padding: 4px;
      font-size: clamp(8px, 2vw, 10px);
      text-align: center;
      border-bottom: 1px solid #000080;
    }
    .window-body {
      background: #E0E0E0;
      padding: 8px;
      border: 1px inset #808080;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(7px, 1.8vw, 9px);
      color: #000080;
      background: #E0E0E0;
    }
    th, td {
      border: 1px inset #808080;
      padding: 8px;
      text-align: left;
    }
    th {
      background: linear-gradient(180deg, #C0C0C0 0%, #A0A0A0 100%);
      cursor: pointer;
      user-select: none;
    }
    th:hover {
      background: linear-gradient(180deg, #D0D0D0 0%, #B0B0B0 100%);
    }
    th:active {
      background: linear-gradient(180deg, #A0A0A0 0%, #808080 100%);
    }
    .error {
      font-size: clamp(8px, 2vw, 10px);
      color: #FF0055;
      text-shadow: 0.5px 0.5px 0 #FFFFFF;
      text-align: center;
      margin: 10px 0;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3;
      display: none;
    }
    .loading-window {
      background: #C0C0C0;
      border: 2px solid #000080;
      border-top: 2px solid #FFFFFF;
      border-left: 2px solid #FFFFFF;
      border-bottom: 2px solid #808080;
      border-right: 2px solid #808080;
      padding: 10px;
      border-radius: 4px;
      box-shadow: 2px 2px 0 #000;
      text-align: center;
      width: clamp(200px, 70vw, 400px);
    }
    .loading-window p {
      font-size: clamp(8px, 2vw, 10px);
      color: #000080;
      text-shadow: 0.5px 0.5px 0 #FFFFFF;
      margin: 8px 0;
    }
    @media (min-width: 768px) {
      .window { transform: scale(1.1); transform-origin: top center; }
      #site-title { font-size: clamp(18px, 4vw, 22px); }
    }
    @media (max-width: 767px) {
      .window { width: clamp(180px, 75vw, 360px); }
      table, th, td { font-size: clamp(6px, 1.6vw, 8px); }
      .home-btn { width: 28px; height: 28px; }
      .home-btn svg { width: 16px; height: 16px; }
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-window">
      <p>Loading...</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <a href="/" class="home-btn" title="Back to Home">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3l10 9h-3v9h-7v-6h-2v6H3v-9H0l12-9z"/>
      </svg>
    </a>
    <h1 id="site-title">My<span>M</span>ilio Points Leaderboard</h1>
    <div class="window">
      <div class="title-bar">Points Leaderboard</div>
      <div class="window-body">
        <table id="pointsTable" style="display: none;">
          <thead>
            <tr>
              <th data-sort="address">Address</th>
              <th data-sort="points">Points</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <p id="loading" class="error">Loading...</p>
        <p id="error" class="error" style="display: none;"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script>
    async function initSupabase() {
      if (typeof supabase === 'undefined') {
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('error').textContent = 'Error: Supabase library not loaded';
        document.getElementById('error').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        return;
      }

      const supabaseUrl = 'https://vkxchgckwyqnxlmirqqu.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZreGNoZ2Nrd3lxbnhsbWlycXF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTExNTMwMDgsImV4cCI6MjA2NjcyOTAwOH0.QPkNrTzccpy7v2Wuhsut-Ra50gy4-mbzxZxtzyJrz80';
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      async function fetchPointsTable() {
        try {
          const { data, error } = await supabaseClient
            .from('points')
            .select('address, points')
            .order('points', { ascending: false });

          if (error) {
            throw error;
          }

          document.getElementById('loading-overlay').style.display = 'none';
          document.getElementById('loading').style.display = 'none';
          document.getElementById('pointsTable').style.display = 'table';

          const tableBody = document.getElementById('tableBody');
          tableBody.innerHTML = '';

          data.forEach(row => {
            const tr = document.createElement('tr');
            // Mask address: show first 6 and last 4 characters
            const address = row.address && row.address.length > 10
              ? `${row.address.slice(0, 6)}...${row.address.slice(-4)}`
              : row.address || 'N/A';
            tr.innerHTML = `
              <td data-address="${row.address}">${address}</td>
              <td>${row.points || 0}</td>
            `;
            tableBody.appendChild(tr);
          });

          // Add sorting functionality
          let sortDirection = { address: 1, points: -1 };
          const headers = document.querySelectorAll('th[data-sort]');
          headers.forEach(header => {
            header.addEventListener('click', () => {
              const sortKey = header.getAttribute('data-sort');
              sortDirection[sortKey] *= -1;
              const rows = Array.from(tableBody.querySelectorAll('tr'));
              rows.sort((a, b) => {
                let aValue = sortKey === 'address'
                  ? a.querySelector(`td[data-address]`).getAttribute('data-address').toLowerCase()
                  : parseInt(a.querySelectorAll('td')[1].textContent);
                let bValue = sortKey === 'address'
                  ? b.querySelector(`td[data-address]`).getAttribute('data-address').toLowerCase()
                  : parseInt(b.querySelectorAll('td')[1].textContent);
                if (sortKey === 'address') {
                  return sortDirection[sortKey] * aValue.localeCompare(bValue);
                }
                return sortDirection[sortKey] * (aValue - bValue);
              });
              tableBody.innerHTML = '';
              rows.forEach(row => tableBody.appendChild(row));
            });
          });
        } catch (error) {
          document.getElementById('loading-overlay').style.display = 'none';
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').textContent = `Error fetching data: ${error.message} (Check table name, schema, or RLS policies)`;
          document.getElementById('error').style.display = 'block';
        }
      }

      await fetchPointsTable();
    }

    window.addEventListener('load', () => {
      setTimeout(initSupabase, 100);
    });
  </script>
</body>
</html>
