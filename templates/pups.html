<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyMilio Rewards - Submit Address</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <style>
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #008080 0%, #003F3F 100%);
      font-family: 'Press Start 2P', cursive;
      color: #000;
      display: flex;
      justify-content: center;
      box-sizing: border-box;
    }
    #background-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-float {
      position: absolute;
      opacity: 0.15;
      pointer-events: none;
      max-width: 170px;
      animation: float-circle 20s linear infinite;
      transform-origin: center;
    }
    .bg-float:nth-child(1) { animation-duration: 22s; animation-delay: 0s; }
    .bg-float:nth-child(2) { animation-duration: 25s; animation-delay: 3s; }
    .bg-float:nth-child(3) { animation-duration: 28s; animation-delay: 6s; }
    .bg-float:nth-child(4) { animation-duration: 23s; animation-delay: 9s; }
    @keyframes float-circle {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(20vw, 20vh) rotate(90deg); }
      50% { transform: translate(40vw, 0) rotate(180deg); }
      75% { transform: translate(20vw, -20vh) rotate(270deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }
    .main-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 600px;
      padding: 10px;
      padding-bottom: 50px;
      box-sizing: border-box;
    }
    .home-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background: linear-gradient(180deg, #C0C0C0 0%, #A0A0A0 100%);
      border: 1px solid #000;
      border-top: 1px solid #FFFFFF;
      border-left: 1px solid #FFFFFF;
      border-bottom: 1px solid #808080;
      border-right: 1px solid #808080;
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 3px;
      box-shadow: 1px 1px 0 #000;
      transition: background 0.2s, transform 0.1s;
    }
    .home-btn:hover {
      background: linear-gradient(180deg, #D0D0D0 0%, #B0B0B0 100%);
      transform: translate(-1px, -1px);
    }
    .home-btn:active {
      background: linear-gradient(180deg, #A0A0A0 0%, #808080 100%);
      transform: translate(1px, 1px);
      box-shadow: none;
      border: 1px inset #808080;
    }
    .home-btn svg {
      width: 20px;
      height: 20px;
      fill: #000080;
    }
    #site-title {
      font-size: clamp(16px, 4vw, 20px);
      margin: 50px 0 15px 0;
      color: #FFFFFF;
      text-shadow: 1px 1px 0 #000080, 2px 2px 0 #000;
      text-align: center;
    }
    #site-title span {
      color: #FF0055;
    }
    .window {
      background: #C0C0C0;
      border: 2px solid #000080;
      border-top: 2px solid #FFFFFF;
      border-left: 2px solid #FFFFFF;
      border-bottom: 2px solid #808080;
      border-right: 2px solid #808080;
      width: clamp(200px, 80vw, 400px);
      box-shadow: 2px 2px 0 #000;
      margin: 10px 0;
      border-radius: 4px;
    }
    .title-bar {
      background: linear-gradient(90deg, #000080 0%, #1084D0 100%);
      color: #FFFFFF;
      padding: 4px;
      font-size: clamp(8px, 2vw, 10px);
      text-align: center;
      border-bottom: 1px solid #000080;
    }
    .window-body {
      background: #E0E0E0;
      padding: 8px;
      border: 1px inset #808080;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .form-field {
      width: 100%;
      margin-bottom: 10px;
    }
    .form-field label {
      font-size: clamp(8px, 2vw, 10px);
      color: #000080;
      text-shadow: 0.5px 0.5px 0 #FFFFFF;
      display: block;
      margin-bottom: 5px;
    }
    .form-field input {
      width: 100%;
      padding: 5px;
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(7px, 1.8vw, 9px);
      background: #FFFFFF;
      border: 1px inset #808080;
      color: #000080;
      box-sizing: border-box;
    }
    .submit-btn {
      background: linear-gradient(180deg, #C0C0C0 0%, #A0A0A0 100%);
      border: 1px solid #000;
      border-top: 1px solid #FFFFFF;
      border-left: 1px solid #FFFFFF;
      border-bottom: 1px solid #808080;
      border-right: 1px solid #808080;
      padding: 5px 10px;
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(8px, 2vw, 10px);
      color: #000080;
      cursor: pointer;
      box-shadow: 1px 1px 0 #000;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover {
      background: linear-gradient(180deg, #D0D0D0 0%, #B0B0B0 100%);
      transform: translate(-1px, -1px);
    }
    .submit-btn:active {
      background: linear-gradient(180deg, #A0A0A0 0%, #808080 100%);
      transform: translate(1px, 1px);
      box-shadow: none;
      border: 1px inset #808080;
    }
    .error, .success {
      font-size: clamp(8px, 2vw, 10px);
      text-shadow: 0.5px 0.5px 0 #FFFFFF;
      text-align: center;
      margin: 10px 0;
    }
    .error { color: #FF0055; }
    .success { color: #008000; }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3;
      display: none;
    }
    .loading-window {
      background: #C0C0C0;
      border: 2px solid #000080;
      border-top: 2px solid #FFFFFF;
      border-left: 2px solid #FFFFFF;
      border-bottom: 2px solid #808080;
      border-right: 2px solid #808080;
      padding: 10px;
      border-radius: 4px;
      box-shadow: 2px 2px 0 #000;
      text-align: center;
      width: clamp(200px, 70vw, 400px);
    }
    .loading-window img {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
    }
    .loading-window p {
      font-size: clamp(8px, 2vw, 10px);
      color: #000080;
      text-shadow: 0.5px 0.5px 0 #FFFFFF;
      margin: 8px 0;
    }
    @media (min-width: 768px) {
      .window { transform: scale(1.1); transform-origin: top center; }
      #site-title { font-size: clamp(18px, 4vw, 22px); }
    }
    @media (max-width: 767px) {
      .form-field label, .form-field input, .submit-btn {
        font-size: clamp(6px, 1.6vw, 8px);
      }
      .home-btn { width: 28px; height: 28px; }
      .home-btn svg { width: 16px; height: 16px; }
      #site-title { margin-top: 45px; }
    }
  </style>
</head>
<body>
  <!-- Background Container -->
  <div id="background-container">
    <img src="/static/float1.png" class="bg-float" alt="Floating Image 1">
    <img src="/static/float2.png" class="bg-float" alt="Floating Image 2">
    <img src="/static/float3.png" class="bg-float" alt="Floating Image 3">
    <img src="/static/float4.png" class="bg-float" alt="Floating Image 4">
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-window">
      <img src="/static/loading.gif" alt="Loading">
      <p>Submitting...</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <a href="/" class="home-btn" title="Back to Home">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3l10 9h-3v9h-7v-6h-2v6H3v-9H0l12-9z"/>
      </svg>
    </a>
    <h1 id="site-title">My<span>M</span>ilio Address Submission</h1>
    <div class="window">
      <div class="title-bar">Submit Ethereum Address</div>
      <div class="window-body">
        <p id="error" class="error" style="display: none;"></p>
        <p id="success" class="success" style="display: none;"></p>
        <form id="address-form">
          <div class="form-field">
            <label for="eth-address">Ethereum Address:</label>
            <input type="text" id="eth-address" name="eth-address" placeholder="0x..." required>
          </div>
          <button type="submit" class="submit-btn">Submit</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const JSONBIN_URL = "https://api.jsonbin.io/v3/b/686764378a456b7966bb0f39";
    const JSONBIN_API_KEY = "$2a$10$M562cLtP49PHOKoyNDkqEef/Q2khR30mjALfNQxWpsJ2JjsljSAru";

    document.addEventListener('DOMContentLoaded', () => {
      // Randomize floating image positions
      const floats = document.querySelectorAll('.bg-float');
      floats.forEach((float, index) => {
        const maxX = window.innerWidth - 170;
        const maxY = window.innerHeight - 170;
        const startX = Math.random() * maxX;
        const startY = Math.random() * maxY;
        float.style.left = `${startX}px`;
        float.style.top = `${startY}px`;
        float.style.animationDirection = Math.random() > 0.5 ? 'normal' : 'reverse';
      });

      const form = document.getElementById('address-form');
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      const loadingOverlay = document.getElementById('loading-overlay');
      const ethAddressInput = document.getElementById('eth-address');

      // Ethereum address validation (basic check for 0x + 40 hex characters)
      function isValidEthAddress(address) {
        return /^0x[a-fA-F0-9]{40}$/.test(address);
      }

      // Handle form submission
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.style.display = 'none';
        successEl.style.display = 'none';
        loadingOverlay.style.display = 'flex';

        const address = ethAddressInput.value.trim();

        if (!isValidEthAddress(address)) {
          loadingOverlay.style.display = 'none';
          errorEl.textContent = '🚨 Invalid Ethereum address. Must start with 0x and be 42 characters long.';
          errorEl.style.display = 'block';
          return;
        }

        try {
          // Fetch current data
          let response = await fetch(JSONBIN_URL, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
          });
          let data = await response.json();

          if (!response.ok) {
            throw new Error(`HTTP error ${response.status}`);
          }

          // Initialize addresses array if it doesn't exist
          const addresses = data.record.addresses || [];

          // Check for duplicate address
          if (addresses.includes(address)) {
            loadingOverlay.style.display = 'none';
            errorEl.textContent = '🚨 This address has already been submitted.';
            errorEl.style.display = 'block';
            return;
          }

          // Add new address
          addresses.push(address);

          // Update JSON bin
          response = await fetch(JSONBIN_URL, {
            method: 'PUT',
            headers: {
              'X-Master-Key': JSONBIN_API_KEY,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ addresses, last_updated: new Date().toISOString() })
          });

          if (!response.ok) {
            throw new Error(`HTTP error ${response.status}`);
          }

          loadingOverlay.style.display = 'none';
          successEl.textContent = '✅ Address submitted successfully!';
          successEl.style.display = 'block';
          ethAddressInput.value = ''; // Clear input
        } catch (error) {
          console.error('Error submitting address:', error);
          loadingOverlay.style.display = 'none';
          errorEl.textContent = `🚨 Error: ${error.message}`;
          errorEl.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
