<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mymillios</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/xp.css">
  <style>
    /* General Reset and Layout */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #008080; /* Retro teal background */
      font-family: 'Press Start 2P', monospace;
      color: #000;
    }

    /* Main Container */
    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 800px;
      padding: 1rem;
    }

    /* Site Title */
    #site-title {
      font-size: 2rem;
      text-align: center;
      margin: 1rem 0;
      color: #000080;
      text-shadow: 2px 2px #C0C0C0;
    }

    /* ENTRY POPUP */
    #entry-popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #entry-popup .popup-modal {
      background: #C0C0C0;
      border: 4px solid #000080;
      padding: 2rem;
      text-align: center;
      box-shadow: 4px 4px 0 #000;
    }
    #entry-popup h2 {
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
    }

    /* Button Styling (Unified) */
    .btn {
      margin: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      border: 2px solid #000;
      background: #C0C0C0;
      border-radius: 8px;
      font-family: 'Press Start 2P', monospace;
      color: #000;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover {
      background: #A0A0A0;
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(0);
    }

    /* AUDIO CONTROLS */
    #audio-controls {
      position: fixed;
      bottom: 1rem; right: 1rem;
      display: none;
      gap: 0.5rem;
      z-index: 999;
    }
    #audio-controls .btn {
      font-size: 1.5rem;
      padding: 0.5rem;
      background: #C0C0C0;
      border: 2px solid #000;
      border-radius: 8px;
    }

    /* PLAYLIST */
    #playlist-container {
      font-size: 0.75rem;
      margin: 1rem 0;
      text-align: center;
      width: 100%;
    }
    #playlist-title {
      cursor: default;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    #playlist {
      list-style: none;
      padding: 0.5rem;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
    #playlist li {
      cursor: pointer;
      text-decoration: underline;
      color: #000080;
    }
    #playlist li:hover {
      color: #0000FF;
    }

    /* WINDOW STYLING */
    .window {
      width: 100%;
      max-width: 500px;
      margin: 1rem 0;
    }
    .title-bar {
      background: #000080;
      color: #FFF;
      padding: 0.5rem;
      font-size: 1rem;
      text-align: center;
    }
    .window-body {
      background: #C0C0C0;
      padding: 1rem;
      border: 2px solid #000;
      border-top: none;
    }
    #combo-container {
      display: flex;
      justify-content: center;
      position: relative;
      width: 100%;
      height: 300px; /* Adjust as needed */
    }
    #combo-container img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Button Container */
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }
    .nft-text {
      font-size: 0.9rem;
      text-align: center;
      max-width: 80%;
      color: #000080;
    }

    /* DESKTOP SCALING */
    @media (min-width: 768px) {
      .window {
        transform: scale(1.25);
        transform-origin: top center;
      }
      #site-title {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Entry Popup -->
  <div id="entry-popup">
    <div class="popup-modal">
      <h2>Enter Sketch Wrld?</h2>
      <button class="btn" id="enter-yes">Yes</button>
      <button class="btn" id="enter-no">No</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <h1 id="site-title">My<span>m</span>illios</h1>
    <div class="window">
      <div class="title-bar">mymillio generatooor</div>
      <div class="window-body">
        <div id="combo-container">
          {% for layer in layers %}
          <img id="layer-{{layer}}" src="" alt="" />
          {% endfor %}
        </div>
        <div class="buttons">
          <div class="nft-text">Holding a SketchyMilio gives you access to mint and receive airdrops for all things MyMilio!</div>
          <button class="btn" id="randomize-btn">Randomize!</button>
          <a href="https://www.scatter.art/collection/sketchymilios-by-mymilio" target="_blank" class="btn">MINT</a>
          <a href="https://x.com/sketchymilios" target="_blank" class="btn">Twitter</a>
        </div>
      </div>
    </div>

    <!-- Playlist -->
    <div id="playlist-container">
      <div id="playlist-title">Sketchymillio EP1</div>
      <ul id="playlist">
        <li data-src="/static/song1.mp3">Song1</li>
        <li data-src="/static/song2.mp3">Song2</li>
        <li data-src="/static/song3.mp3">Song3</li>
      </ul>
    </div>
  </div>

  <!-- Audio Controls -->
  <div id="audio-controls">
    <button class="btn" id="play-btn">▶️</button>
    <button class="btn" id="stop-btn">⏹️</button>
    <button class="btn" id="mute-btn">🔇</button>
    <button class="btn" id="vol-down-btn">🔉</button>
    <button class="btn" id="vol-up-btn">🔊</button>
  </div>

  <script>
    const layerFiles = {{ layer_files | tojson }};
    const layers     = {{ layers | tojson }};

    // randomizeCombo: pick new layer images, rasterize + add 50% noise
    function randomizeCombo() {
      const validLayers = layers.filter(l => (layerFiles[l] || []).length);
      let loadedCount = 0;

      validLayers.forEach(layer => {
        const opts = layerFiles[layer];
        const pick = opts[Math.floor(Math.random() * opts.length)];
        const imgEl = document.getElementById(`layer-${layer}`);

        const temp = new Image();
        temp.crossOrigin = 'anonymous';
        temp.onload = () => {
          const w = temp.width, h = temp.height;
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(temp, 0, 0);
          const id = ctx.getImageData(0, 0, w, h);
          const d = id.data;
          for (let i = 0; i < d.length; i += 4) {
            const noise = (Math.random() - 0.2) * 255 * 0.2;
            d[i]   = d[i]   + noise;
            d[i+1] = d[i+1] + noise;
            d[i+2] = d[i+2] + noise;
          }
          ctx.putImageData(id, 0, 0);
          imgEl.src = canvas.toDataURL();
          loadedCount++;
        };
        temp.src = `/static/${layer}/${pick}`;
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const audio = new Audio('/static/song1.mp3');
      audio.loop = true;
      audio.volume = 0.5;

      const popup    = document.getElementById('entry-popup');
      const controls = document.getElementById('audio-controls');

      document.getElementById('enter-yes').onclick = () => {
        popup.style.display    = 'none';
        controls.style.display = 'flex';
        randomizeCombo();
        audio.play();
      };
      document.getElementById('enter-no').onclick = () => {
        popup.style.display    = 'none';
        controls.style.display = 'flex';
        randomizeCombo();
      };

      document.getElementById('randomize-btn').onclick = randomizeCombo;

      document.getElementById('play-btn').onclick     = () => audio.play();
      document.getElementById('stop-btn').onclick     = () => { audio.pause(); audio.currentTime = 0; };
      document.getElementById('mute-btn').onclick     = () => audio.muted = !audio.muted;
      document.getElementById('vol-down-btn').onclick = () => audio.volume = Math.max(0, audio.volume - 0.1);
      document.getElementById('vol-up-btn').onclick   = () => audio.volume = Math.min(1, audio.volume + 0.1);

      document.querySelectorAll('#playlist li').forEach(li => {
        li.onclick = () => {
          audio.pause();
          audio.src = li.dataset.src;
          audio.play();
        };
      });
    });
  </script>
</body>
</html>
