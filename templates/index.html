<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mymillios</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/xp.css">
  <style>
    /* ENTRY POPUP */
    #entry-popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #entry-popup .popup-modal {
      background: #C0C0C0;
      border: 4px solid #000080;
      padding: 2rem;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      color: #000;
    }
    #entry-popup h2 {
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
    }
    #entry-popup button {
      margin: 0 .5rem;
      padding: .5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      border: 2px solid #000;
      background: #FFF;
      border-radius: 8px;
      font-family: 'Press Start 2P', monospace;
      transition: background 0.3s, transform 0.1s;
    }
    #entry-popup button:hover {
      background: #E0E0E0;
      transform: scale(1.05);
    }

    /* AUDIO CONTROLS */
    #audio-controls {
      position: fixed;
      bottom: 1rem; right: 1rem;
      display: none;
      gap: .5rem;
      z-index: 999;
    }
    #audio-controls button {
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: .2rem;
    }

    /* PLAYLIST */
    #playlist-container {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      margin: 1rem auto;
      text-align: center;
    }
    #playlist-title {
      cursor: default;
    }
    #playlist {
      list-style: none;
      padding: 0.5rem;
      margin: 0.5rem 0 0;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
    #playlist li {
      cursor: pointer;
      text-decoration: underline;
    }

    /* DESKTOP SCALING */
    @media (min-width: 768px) {
      .window {
        transform: scale(1.25);
        transform-origin: top center;
      }
    }

    /* WINDOW BODY */
    .window-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    /* BUTTON STYLING */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }
    .buttons button, .buttons a {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      border: 2px solid #000;
      background: #FFF;
      border-radius: 8px;
      text-decoration: none;
      color: #000;
      font-family: 'Press Start 2P', monospace;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      transition: background 0.3s, transform 0.1s;
    }
    .buttons button:hover, .buttons a:hover {
      background: #E0E0E0;
      transform: scale(1.05);
    }

    /* MINT INFO TEXT */
    .mint-info {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.9rem;
      text-align: center;
      margin: 1rem 0;
      color: #000;
      max-width: 80%;
    }
  </style>
</head>
<body>
  <!-- Entry Popup -->
  <div id="entry-popup">
    <div class="popup-modal">
      <h2>Enter Sketch Wrld?</h2>
      <button id="enter-yes">Yes</button>
      <button id="enter-no">No</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <h1 id="site-title">My<span>m</span>illios</h1>
    <div class="window">
      <div class="title-bar">mymillio generatooor</div>
      <div class="window-body">
        <div id="combo-container">
          {% for layer in layers %}
          <img id="layer-{{layer}}" src="" alt="" />
          {% endfor %}
        </div>
        <div class="mint-info">
          Holding a SketchyMilio grants exclusive access to mint and receive airdrops for all MyMilio projects!
        </div>
        <div class="buttons">
          <button id="randomize-btn">Randomize!</button>
          <a href="https://www.scatter.art/collection/sketchymilios-by-mymilio" target="_blank">MINT</a>
          <a href="https://x.com/sketchymilios" target="_blank">Twitter</a>
        </div>
      </div>
    </div>

    <!-- Playlist -->
    <div id="playlist-container">
      <div id="playlist-title">Sketchymillio EP1</div>
      <ul id="playlist">
        <li data-src="/static/song1.mp3">Song1</li>
        <li data-src="/static/song2.mp3">Song2</li>
        <li data-src="/static/song3.mp3">Song3</li>
      </ul>
    </div>
  </div>

  <!-- Audio Controls -->
  <div id="audio-controls">
    <button id="play-btn">▶️</button>
    <button id="stop-btn">⏹️</button>
    <button id="mute-btn">🔇</button>
    <button id="vol-down-btn">🔉</button>
    <button id="vol-up-btn">🔊</button>
  </div>

  <script>
    const layerFiles = {{ layer_files | tojson }};
    const layers     = {{ layers | tojson }};

    // randomizeCombo: pick new layer images, rasterize + add 50% noise
    function randomizeCombo() {
      // only layers with available files
      const validLayers = layers.filter(l => (layerFiles[l] || []).length);
      let loadedCount = 0;

      validLayers.forEach(layer => {
        const opts = layerFiles[layer];
        const pick = opts[Math.floor(Math.random() * opts.length)];
        const imgEl = document.getElementById(`layer-${layer}`);

        // load into temp image, then draw to canvas + noise
        const temp = new Image();
        temp.crossOrigin = 'anonymous';
        temp.onload = () => {
          const w = temp.width, h = temp.height;
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(temp, 0, 0);
          // pixel noise
          const id = ctx.getImageData(0, 0, w, h);
          const d = id.data;
          for (let i = 0; i < d.length; i += 4) {
            const noise = (Math.random() - 0.2) * 255 * 0.2; // ±50% intensity
            d[i]   = d[i]   + noise; // R
            d[i+1] = d[i+1] + noise; // G
            d[i+2] = d[i+2] + noise; // B
          }
          ctx.putImageData(id, 0, 0);
          // update visible <img>
          imgEl.src = canvas.toDataURL();

          loadedCount++;
        };
        temp.src = `/static/${layer}/${pick}`;
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const audio = new Audio('/static/song1.mp3');
      audio.loop = true;
      audio.volume = 0.5;

      const popup    = document.getElementById('entry-popup');
      const controls = document.getElementById('audio-controls');

      document.getElementById('enter-yes').onclick = () => {
        popup.style.display    = 'none';
        controls.style.display = 'flex';
        randomizeCombo();
        audio.play();
      };
      document.getElementById('enter-no').onclick = () => {
        popup.style.display    = 'none';
        controls.style.display = 'flex';
        randomizeCombo();
      };

      document.getElementById bile('randomize-btn').onclick = randomizeCombo;

      // Audio controls
      document.getElementById('play-btn').onclick     = () => audio.play();
      document.getElementById('stop-btn').onclick     = () => { audio.pause(); audio.currentTime = 0; };
      document.getElementById('mute-btn').onclick     = () => audio.muted = !audio.muted;
      document.getElementById('vol-down-btn').onclick = () => audio.volume = Math.max(0, audio.volume - 0.1);
      document.getElementById('vol-up-btn').onclick   = () => audio.volume = Math.min(1, audio.volume + 0.1);

      // Playlist switching
      document.querySelectorAll('#playlist li').forEach(li => {
        li.onclick = () => {
          audio.pause();
          audio.src = li.dataset.src;
          audio.play();
        };
      });
    });
  </script>
</body>
</html>
