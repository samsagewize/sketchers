<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyMilio</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* Reset and Base Styles */
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #008080 0%, #003F3F 100%);
      font-family: 'Press Start 2P', cursive;
      color: #000;
      display: flex;
      justify-content: center;
      box-sizing: border-box;
    }

    /* Background Floating Elements */
    #background-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .bg-float {
      position: absolute;
      opacity: 0.15;
      pointer-events: none;
    }

    /* Main Container */
    .main-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 800px;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Site Title */
    #site-title {
      font-size: clamp(24px, 6vw, 36px);
      margin: 20px 0;
      color: #FFFFFF;
      text-shadow: 2px 2px 0 #000080, 4px 4px 0 #000;
      text-align: center;
    }
    #site-title span {
      color: #FF0055;
    }

    /* Entry Popup */
    #entry-popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #entry-popup .popup-modal {
      background: #C0C0C0;
      border: 3px solid #000080;
      border-top: 3px solid #FFFFFF;
      border-left: 3px solid #FFFFFF;
      border-bottom: 3px solid #808080;
      border-right: 3px solid #808080;
      padding: 2rem;
      text-align: center;
      box-shadow: 4px 4px 0 #000;
    }
    #entry-popup h2 {
      margin-bottom: 1.5rem;
      font-size: clamp(14px, 3vw, 16px);
      color: #000080;
    }

    /* Unified Button Styling */
    .btn {
      background: linear-gradient(180deg, #C0C0C0 0%, #A0A0A0 100%);
      border: 2px solid #000;
      border-top: 2px solid #FFFFFF;
      border-left: 2px solid #FFFFFF;
      border-bottom: 2px solid #808080;
      border-right: 2px solid #808080;
      padding: 8px 16px;
      font-size: clamp(10px, 2.5vw, 12px);
      cursor: pointer;
      font-family: 'Press Start 2P', cursive;
      color: #000080;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      border-radius: 4px;
      box-shadow: 2px 2px 0 #000;
    }
    .btn:hover {
      background: linear-gradient(180deg, #D0D0D0 0%, #B0B0B0 100%);
      transform: translate(-1px, -1px);
    }
    .btn:active {
      border: 2px inset #808080;
      transform: translate(1px, 1px);
      box-shadow: none;
    }

    /* Window Styling */
    .window {
      background: #C0C0C0;
      border: 3px solid #000080;
      border-top: 3px solid #FFFFFF;
      border-left: 3px solid #FFFFFF;
      border-bottom: 3px solid #808080;
      border-right: 3px solid #808080;
      width: clamp(300px, 80vw, 500px);
      box-shadow: 4px 4px 0 #000;
      margin: 20px 0;
    }
    .title-bar {
      background: linear-gradient(90deg, #000080 0%, #1084D0 100%);
      color: #FFFFFF;
      padding: 8px;
      font-size: clamp(12px, 3vw, 14px);
      text-align: center;
      border-bottom: 2px solid #000080;
    }
    .window-body {
      background: #E0E0E0;
      padding: 12px;
      border: 2px inset #808080;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Combo Container (Image Display) */
    #combo-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-width: clamp(200px, 60vw, 400px);
      margin-bottom: 12px;
      border: 2px inset #808080;
      background: #000;
      overflow: hidden;
    }
    #combo-container img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
    }

    /* Buttons and NFT Text */
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .nft-text {
      font-size: clamp(10px, 2.5vw, 12px);
      color: #000080;
      text-align: center;
      max-width: 90%;
      text-shadow: 1px 1px 0 #FFFFFF;
      margin-bottom: 8px;
    }

    /* Custom Audio Player */
    #audio-player {
      background: #C0C0C0;
      border: 3px solid #000080;
      border-top: 3px solid #FFFFFF;
      border-left: 3px solid #FFFFFF;
      border-bottom: 3px solid #808080;
      border-right: 3px solid #808080;
      padding: 8px;
      box-shadow: 4px 4px 0 #000;
      z-index: 999;
      display: none;
      flex-direction: column;
      gap: 8px;
      width: clamp(200px, 50vw, 300px);
      margin: 20px 0;
    }
    #audio-player .title-bar {
      font-size: clamp(10px, 2.5vw, 12px);
      padding: 6px;
    }
    #audio-player .player-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #E0E0E0;
      padding: 8px;
      border: 2px inset #808080;
    }
    #audio-player .song-title {
      font-size: clamp(10px, 2.5vw, 12px);
      color: #000080;
      text-align: center;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }
    #audio-player .timer {
      font-size: clamp(8px, 2vw, 10px);
      color: #000080;
      text-align: center;
    }
    #audio-player .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    #audio-player .btn {
      padding: 6px;
      font-size: clamp(10px, 2.5vw, 12px);
    }

    /* Playlist */
    #playlist-container {
      font-size: clamp(10px, 2.5vw, 12px);
      margin: 20px 0;
      text-align: center;
      width: 100%;
      display: none; /* Hidden by default (for mobile) */
    }
    #playlist-title {
      font-size: clamp(12px, 3vw, 14px);
      color: #000080;
      text-shadow: 1px 1px 0 #FFFFFF;
      margin-bottom: 8px;
      cursor: default;
    }
    #playlist {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    #playlist li {
      cursor: pointer;
      color: #000080;
      text-decoration: underline;
    }
    #playlist li:hover {
      color: #FF0055;
    }

    /* Responsive Adjustments */
    @media (min-width: 768px) {
      .window {
        transform: scale(1.2);
        transform-origin: top center;
      }
      #site-title {
        font-size: clamp(28px, 6vw, 40px);
      }
      #combo-container {
        max-width: 450px;
      }
      #playlist-container {
        display: block; /* Show playlist on desktop */
      }
      #audio-player {
        position: fixed;
        bottom: 20px;
        right: 20px;
        margin: 0; /* Override margin for fixed positioning */
      }
    }
    @media (max-width: 767px) {
      #playlist-container {
        display: none; /* Hide playlist on mobile */
      }
      #audio-player {
        position: static; /* Place in normal flow on mobile */
        width: clamp(150px, 80vw, 250px); /* Smaller width on mobile */
      }
      #audio-player .song-title,
      #audio-player .btn,
      #audio-player .title-bar {
        font-size: clamp(8px, 2vw, 10px); /* Smaller font on mobile */
      }
      #audio-player .timer {
        font-size: clamp(7px, 1.8vw, 9px);
      }
    }
  </style>
</head>
<body>
  <!-- Background Container -->
  <div id="background-container"></div>

  <!-- Entry Popup -->
  <div id="entry-popup">
    <div class="popup-modal">
      <h2>Enter SketchyMilio Wrld?</h2>
      <button class="btn" id="enter-yes">Yes</button>
      <button class="btn" id="enter-no">No</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <h1 id="site-title">My<span>M</span>ilio</h1>
    <div class="window">
      <div class="title-bar">mymilio generatooor</div>
      <div class="window-body">
        <div id="combo-container">
          {% for layer in layers %}
          <img id="layer-{{layer}}" src="" alt="" />
          {% endfor %}
        </div>
        <div class="buttons">
          <div class="nft-text">Holding a SketchyMilio gives you access to mint and receive airdrops for all things MyMilio!</div>
          <button class="btn" id="randomize-btn">Randomize!</button>
          <a href="https://www.scatter.art/collection/sketchymilios-by-mymilio" target="_blank" class="btn">MINT</a>
          <a href="https://x.com/sketchymilios" target="_blank" class="btn">Twitter</a>
        </div>
      </div>
    </div>

    <!-- Playlist -->
    <div id="playlist-container">
      <div id="playlist-title">SketchyMilio EP1</div>
      <ul id="playlist">
        <li data-src="/static/song1.mp3">Song1</li>
        <li data-src="/static/song2.mp3">Song2</li>
        <li data-src="/static/song3.mp3">Song3</li>
      </ul>
    </div>

    <!-- Custom Audio Player -->
    <div id="audio-player">
      <div class="title-bar">Audio Player</div>
      <div class="player-body">
        <div class="song-title">No Song Playing</div>
        <div class="timer">0:00 / 0:00</div>
        <div class="controls">
          <button class="btn" id="prev-btn">⏮️</button>
          <button class="btn" id="play-pause-btn">▶️</button>
          <button class="btn" id="stop-btn">⏹️</button>
          <button class="btn" id="next-btn">⏭️</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const layerFiles = {{ layer_files | tojson }};
    const layers = {{ layers | tojson }};

    // Randomize Combo Function
    function randomizeCombo() {
      const validLayers = layers.filter(l => (layerFiles[l] || []).length);
      let loadedCount = 0;

      validLayers.forEach(layer => {
        const opts = layerFiles[layer];
        const pick = opts[Math.floor(Math.random() * opts.length)];
        const imgEl = document.getElementById(`layer-${layer}`);

        const temp = new Image();
        temp.crossOrigin = 'anonymous';
        temp.onload = () => {
          const w = temp.width, h = temp.height;
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(temp, 0, 0);
          const id = ctx.getImageData(0, 0, w, h);
          const d = id.data;
          for (let i = 0; i < d.length; i += 4) {
            const noise = (Math.random() - 0.2) * 255 * 0.2;
            d[i] = d[i] + noise;
            d[i+1] = d[i+1] + noise;
            d[i+2] = d[i+2] + noise;
          }
          ctx.putImageData(id, 0, 0);
          imgEl.src = canvas.toDataURL();
          loadedCount++;
        };
        temp.onerror = () => {
          console.error(`Failed to load image: /static/${layer}/${pick}`);
        };
        temp.src = `/static/${layer}/${pick}`;
      });
    }

    // Format time in MM:SS
    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec.toString().padStart(2, '0')}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const audio = new Audio();
      audio.volume = 0.5;

      const popup = document.getElementById('entry-popup');
      const player = document.getElementById('audio-player');
      const playPauseBtn = document.getElementById('play-pause-btn');
      const stopBtn = document.getElementById('stop-btn');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const songTitle = document.querySelector('#audio-player .song-title');
      const timer = document.querySelector('#audio-player .timer');

      // Playlist data
      const playlist = [
        { src: '/static/song1.mp3', title: 'Song1' },
        { src: '/static/song2.mp3', title: 'Song2' },
        { src: '/static/song3.mp3', title: 'Song3' }
      ];
      let currentSongIndex = 0;

      // Update song info
      function updateSongInfo() {
        audio.src = playlist[currentSongIndex].src;
        songTitle.textContent = playlist[currentSongIndex].title;
        timer.textContent = '0:00 / 0:00';
        playPauseBtn.textContent = audio.paused ? '▶️' : '⏸️';
      }

      // Update timer
      audio.addEventListener('timeupdate', () => {
        if (!isNaN(audio.duration)) {
          timer.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        }
      });

      // Handle load errors
      audio.addEventListener('error', () => {
        console.error(`Failed to load audio: ${audio.src}`);
        songTitle.textContent = 'Error Loading Song';
        timer.textContent = '0:00 / 0:00';
      });

      // Reset on song end
      audio.addEventListener('ended', () => {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        updateSongInfo();
        audio.play().catch(err => console.error('Playback failed:', err));
      });

      // Popup buttons
      document.getElementById('enter-yes').onclick = () => {
        popup.style.display = 'none';
        player.style.display = 'flex';
        randomizeCombo();
        updateSongInfo(); // Set initial song but don't play
      };
      document.getElementById('enter-no').onclick = () => {
        popup.style.display = 'none';
        player.style.display = 'flex';
        randomizeCombo();
        updateSongInfo(); // Set initial song but don't play
      };

      // Audio controls
      playPauseBtn.onclick = () => {
        if (audio.paused) {
          audio.play().catch(err => {
            console.error('Playback failed:', err);
            songTitle.textContent = 'Error Playing Song';
          });
          playPauseBtn.textContent = '⏸️';
        } else {
          audio.pause();
          playPauseBtn.textContent = '▶️';
        }
      };
      stopBtn.onclick = () => {
        audio.pause();
        audio.currentTime = 0;
        playPauseBtn.textContent = '▶️';
      };
      prevBtn.onclick = () => {
        currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
        updateSongInfo();
        audio.play().catch(err => console.error('Playback failed:', err));
      };
      nextBtn.onclick = () => {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        updateSongInfo();
        audio.play().catch(err => console.error('Playback failed:', err));
      };

      // Playlist clicking (for desktop)
      document.querySelectorAll('#playlist li').forEach((li, index) => {
        li.onclick = () => {
          currentSongIndex = index;
          updateSongInfo();
          audio.play().catch(err => console.error('Playback failed:', err));
        };
      });

      // Randomize button
      document.getElementById('randomize-btn').onclick = randomizeCombo;
    });
  </script>
</body>
</html>
