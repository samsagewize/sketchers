<!DOCTYPE html>
<html>
<head>
    <title>Redeem SketchyMilio</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .error { color: red; }
        .token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .token-card { border: 1px solid #ccc; padding: 10px; text-align: center; }
        img { max-width: 100%; height: auto; }
        form { margin-bottom: 20px; }
        input[type="text"] { padding: 5px; width: 300px; }
        button { padding: 5px 10px; }
    </style>
</head>
<body>
    <h1>Redeem Your SketchyMilio NFTs</h1>
    <p id="error" class="error" style="display: none;"></p>
    <form id="token-form">
        <label for="owner">Wallet Address:</label>
        <input type="text" id="owner" name="owner" placeholder="0x..." required>
        <button type="submit">Fetch Tokens</button>
    </form>
    <h2 id="token-count" style="display: none;">Your Tokens</h2>
    <div id="token-grid" class="token-grid"></div>

    <script>
        const form = document.getElementById("token-form");
        const errorEl = document.getElementById("error");
        const tokenCountEl = document.getElementById("token-count");
        const tokenGrid = document.getElementById("token-grid");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const owner = document.getElementById("owner").value;
            errorEl.style.display = "none";
            tokenGrid.innerHTML = "";
            tokenCountEl.style.display = "none";

            try {
                const response = await fetch("https://sketchy-n6u8.onrender.com/api/tokens", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `owner=${encodeURIComponent(owner)}`
                });
                const data = await response.json();
                if (data.error) {
                    errorEl.textContent = `🚨 ${data.error}`;
                    errorEl.style.display = "block";
                    return;
                }
                if (data.tokens && data.tokens.length > 0) {
                    tokenCountEl.textContent = `Your Tokens (${data.tokens.length})`;
                    tokenCountEl.style.display = "block";
                    data.tokens.forEach(tokenId => {
                        const card = document.createElement("div");
                        card.className = "token-card";
                        card.innerHTML = `<h3>Token #${tokenId}</h3><p>Metadata not available</p>`;
                        tokenGrid.appendChild(card);
                    });
                } else {
                    tokenCountEl.textContent = "No tokens found.";
                    tokenCountEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = `🚨 Failed to fetch tokens: ${err.message}`;
                errorEl.style.display = "block";
            }
        });
    </script>
</body>
</html>
